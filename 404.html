<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Sondgeroth Fit</title>
  <meta name="description" content="The page you were looking for doesn't exist. Head back to Sondgeroth Fit.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: #1a1a1a;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0f0f0f;
      color: #fff;
    }

    header {
      padding: 20px 24px;
      background: rgba(26, 26, 26, 0.92);
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .logo {
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .logo a {
      color: inherit;
      text-decoration: none;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    .content {
      max-width: 560px;
    }

    .code {
      font-size: 5rem;
      font-weight: 800;
      color: #e85d26;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      line-height: 1;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.01em;
    }

    p {
      font-size: 1.05rem;
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 32px;
    }

    .actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 13px 28px;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-decoration: none;
      transition: transform 0.15s, background 0.2s, border-color 0.2s;
    }

    .btn-primary {
      background: #e85d26;
      color: #fff;
    }

    .btn-primary:hover {
      background: #d04e1d;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .btn-secondary:hover {
      border-color: #e85d26;
      color: #e85d26;
    }

    footer {
      padding: 20px 24px;
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.4);
    }

    @media (max-width: 540px) {
      .code { font-size: 3.5rem; }
      h1 { font-size: 1.5rem; }
      p { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo"><a href="/">Sondgeroth Fit</a></div>
    </div>
  </header>

  <main>
    <div class="content">
      <div class="code">404</div>
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist or has moved. Let's get you back on track.</p>
      <div class="actions">
        <a href="/" class="btn btn-primary">Go to Homepage</a>
        <a href="/services/" class="btn btn-secondary">View Services</a>
      </div>
    </div>
  </main>

  <footer>
    &copy; Sondgeroth Fit
  </footer>
</body>
</html>
